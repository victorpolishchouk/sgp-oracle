name: Deploy Preview
on:
  pull_request:
    branches: [ main ]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages (Preview)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # або папка, де лежить ваш index.html (наприклад, 'dist' чи 'build')
          target-folder: previews/${{ github.event.pull_request.head.ref }}
          branch: gh-pages # окрема гілка для збереження статики
