name: Weekly Security Audit

on:
  schedule:
    # Кожної неділі о 23:00 UTC
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  security-tests:
    name: Security Vulnerability Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm ci
      
      - name: Install browsers
        run: npx playwright install --with-deps
      
      - name: Run security tests
        run: npx playwright test --grep @security --reporter=html
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      
      - name: Generate security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: playwright-report/
          retention-days: 90

      - name: Create GitHub Issue on critical failures
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Security Tests Failed - ' + new Date().toISOString().split('T')[0],
              body: `Security vulnerability tests failed!
              
              **Critical findings detected.**
              
              View report: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              
              Please review SEC-002 (XSS) and SEC-004 (Input Limits) test failures.`,
              labels: ['security', 'critical', 'automated']
            })
